<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端适配，禁止缩放，模拟原生App体验 -->
    <!-- viewport-fit=cover 确保在有刘海屏的手机上也能全屏显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小手机 - 桌面</title>
    
    <!-- 引入外部样式表 (CSS) -->
    <link rel="stylesheet" href="style.css">
    
    <!-- 引入 Vue 3 全局版 CDN (在线库) -->
    <!-- 因为不使用 Node.js，我们直接从互联网加载 Vue 的功能 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <!-- Vue 挂载的根容器，所有的内容都在这个 id="app" 的盒子内 -->
    <div id="app" class="phone-container">
        
        <!-- 顶部状态栏：显示时间、信号、电量 -->
        <div class="status-bar">
            <div class="time">{{ currentTime }}</div> <!-- 这里会显示 script.js 中计算出的时间 -->
            <div class="status-icons">
                <span class="wifi-icon">📶</span>
                <div class="battery">
                    <span class="battery-level">{{ battery }}%</span>
                    <div class="battery-body">
                        <!-- 电池电量条，宽度会根据 battery 的值动态改变 -->
                        <div class="battery-fill" :style="{ width: battery + '%' }"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主屏幕内容区：放置各种组件和图标 -->
        <div class="screen-content">
            
            <!-- 音乐播放控制栏 (Glassmorphism风格) -->
            <div class="widget-music glass-card">
                <div class="music-info">
                    <span class="song-name">Now Playing</span>
                    <span class="artist">- iOS Style</span>
                </div>
                <div class="music-controls-ios">
                    <button class="icon-btn">⏮</button>
                    <button class="icon-btn play-pause">⏯</button>
                    <button class="icon-btn">⏭</button>
                </div>
            </div>

            <!-- 桌面应用网格 (iOS 布局) -->
            <div class="app-grid-ios">
                <!-- 第一行：居中一个“世界书”App图标 -->
                <div class="grid-row row-center">
                    <div class="app-item">
                        <div class="app-icon-ios glass-icon">📖</div>
                        <span class="app-label">世界书</span>
                    </div>
                </div>

                <!-- 第二行：靠右一个“预设”App图标 -->
                <div class="grid-row row-right">
                    <div class="app-item">
                        <div class="app-icon-ios glass-icon">⚙️</div>
                        <span class="app-label">预设</span>
                    </div>
                </div>

                <!-- 第三行：从左至右依次排列“X”、“QQ”、“查手机”三个App图标 -->
                <div class="grid-row row-left">
                    <div class="app-item">
                        <div class="app-icon-ios glass-icon">𝕏</div>
                        <span class="app-label">X</span>
                    </div>
                    <div class="app-item">
                        <div class="app-icon-ios glass-icon">🐧</div>
                        <span class="app-label">QQ</span>
                    </div>
                    <div class="app-item">
                        <div class="app-icon-ios glass-icon">🔍</div>
                        <span class="app-label">查手机</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部固定栏 (Dock) -->
        <div class="dock-container">
            <div class="dock glass-dock">
                <div class="app-item">
                    <div class="app-icon-ios glass-icon">🔌</div>
                    <span class="app-label">API</span>
                </div>
                <div class="app-item">
                    <div class="app-icon-ios glass-icon">🏛</div>
                    <span class="app-label">人物大厅</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入逻辑脚本 (JavaScript) -->
    <!-- 放在 body 底部是为了确保 HTML 已经加载完毕后再执行代码 -->
    <script src="script.js"></script>
</body>
</html>
