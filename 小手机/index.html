<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端适配，禁止缩放，模拟原生App体验 -->
    <!-- viewport-fit=cover 确保在有刘海屏的手机上也能全屏显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小手机 - 桌面</title>
    
    <!-- 引入外部样式表 (CSS) -->
    <link rel="stylesheet" href="style.css">
    
    <!-- 引入 Vue 3 全局版 CDN (在线库) -->
    <!-- 因为不使用 Node.js，我们直接从互联网加载 Vue 的功能 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <!-- Vue 挂载的根容器，所有的内容都在这个 id="app" 的盒子内 -->
    <div id="app" class="phone-container">
        
        <!-- 顶部状态栏：显示时间、信号、电量 -->
        <div class="status-bar">
            <div class="time">{{ currentTime }}</div> <!-- 这里会显示 script.js 中计算出的时间 -->
            <div class="status-icons">
                <span class="wifi-icon">📶</span>
                <div class="battery">
                    <span class="battery-level">{{ battery }}%</span>
                    <div class="battery-body">
                        <!-- 电池电量条，宽度会根据 battery 的值动态改变 -->
                        <div class="battery-fill" :style="{ width: battery + '%' }"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主屏幕内容区：放置各种组件和图标 -->
        <div class="screen-content">
            
            <!-- 第一行：音乐播放挂件 -->
            <div class="widget-music">
                <div class="music-info">
                    <span class="song-name">甜心轰炸机</span>
                    <span class="artist">- 虚拟乐团</span>
                </div>
                <div class="music-controls">
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                    <button class="add-btn">+</button>
                </div>
            </div>

            <!-- 中间部分：左侧大组件 + 右侧四个小 APP 图标 -->
            <div class="grid-middle">
                <!-- 2x2 大组件 (通常用来放图片或者天气) -->
                <div class="big-widget">
                    <img src="https://api.dujin.org/bing/m.php" alt="随心看组件" class="widget-img">
                </div>
                
                <!-- 右侧的四个小APP图标 (2x2排列) -->
                <div class="right-apps">
                    <div class="app-item"><div class="app-icon purple">📷</div><span class="app-label">相册</span></div>
                    <div class="app-item"><div class="app-icon pink">💌</div><span class="app-label">对话</span></div>
                    <div class="app-item"><div class="app-icon blue">📅</div><span class="app-label">日程</span></div>
                    <div class="app-item"><div class="app-icon yellow">🎨</div><span class="app-label">外观</span></div>
                </div>
            </div>

            <!-- 下方行：横向排列的四个普通 APP 图标 -->
            <div class="grid-bottom">
                <div class="app-item"><div class="app-icon green">🍃</div><span class="app-label">健康</span></div>
                <div class="app-item"><div class="app-icon orange">🍊</div><span class="app-label">商店</span></div>
                <div class="app-item"><div class="app-icon blue-dark">🌊</div><span class="app-label">浏览器</span></div>
                <div class="app-item"><div class="app-icon red">🎮</div><span class="app-label">游戏</span></div>
            </div>
        </div>

        <!-- 最下方固定底栏 (Dock)，就像手机底部的常用栏 -->
        <div class="dock-container">
            <div class="dock">
                <!-- 这里放置最常用的几个图标 -->
                <div class="app-item"><div class="app-icon dock-icon phone">📞</div></div>
                <div class="app-item"><div class="app-icon dock-icon chat">💬</div></div>
                <div class="app-item"><div class="app-icon dock-icon setting">⚙️</div></div>
            </div>
        </div>
    </div>

    <!-- 引入逻辑脚本 (JavaScript) -->
    <!-- 放在 body 底部是为了确保 HTML 已经加载完毕后再执行代码 -->
    <script src="script.js"></script>
</body>
</html>
